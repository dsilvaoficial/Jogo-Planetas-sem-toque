<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Solar Game</title>

<style>
body { margin: 0; overflow: hidden; background: black; }

#video {
  position: absolute;
  bottom: 10px;
  right: 10px;
  width: 120px;
  border-radius: 10px;
  opacity: 0.7;
  z-index: 10;
}

#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  color: white;
  font-family: Arial;
  z-index: 10;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

</head>
<body>

<div id="ui">🪐 Coloque os planetas na ordem correta</div>
<video id="video" autoplay playsinline></video>

<script>
// ===== THREE =====
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 20;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ===== LUZ =====
scene.add(new THREE.AmbientLight(0xffffff, 0.5));

const light = new THREE.PointLight(0xffffff, 2);
light.position.set(0,0,0);
scene.add(light);

// ===== FUNDO ESTRELAS =====
const starGeo = new THREE.BufferGeometry();
const starCount = 2000;
const positions = [];

for (let i=0;i<starCount;i++){
  positions.push(
    (Math.random()-0.5)*200,
    (Math.random()-0.5)*200,
    (Math.random()-0.5)*200
  );
}

starGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions,3));
const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({color:0xffffff}));
scene.add(stars);

// ===== SOL =====
const sun = new THREE.Mesh(
  new THREE.SphereGeometry(2, 64, 64),
  new THREE.MeshBasicMaterial({ color: 0xffaa00 })
);
scene.add(sun);

// ===== ÓRBITAS =====
function createOrbit(radius){
  const curve = new THREE.EllipseCurve(0,0,radius,radius,0,2*Math.PI);
  const points = curve.getPoints(100);
  const geometry = new THREE.BufferGeometry().setFromPoints(points);
  return new THREE.LineLoop(
    geometry,
    new THREE.LineBasicMaterial({ color: 0x4444ff })
  );
}

// ===== PLANETAS =====
const planetData = [
  {name:"Mercury", color:0xaaaaaa, size:0.3, dist:3},
  {name:"Venus", color:0xffaa66, size:0.5, dist:4},
  {name:"Earth", color:0x3399ff, size:0.5, dist:5},
  {name:"Mars", color:0xff3300, size:0.4, dist:6},
  {name:"Jupiter", color:0xffcc99, size:1, dist:8},
  {name:"Saturn", color:0xffddaa, size:0.9, dist:10},
  {name:"Uranus", color:0x66ccff, size:0.7, dist:12},
  {name:"Neptune", color:0x3366ff, size:0.7, dist:14},
];

const planets = [];

planetData.forEach(p=>{
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(p.size, 32, 32),
    new THREE.MeshStandardMaterial({ color:p.color })
  );

  mesh.position.set(
    (Math.random()-0.5)*20,
    (Math.random()-0.5)*10,
    0
  );

  scene.add(mesh);
  scene.add(createOrbit(p.dist));

  planets.push({mesh, ...p});
});

// ===== MÃO =====
let targetX=0, targetY=0;
let smoothX=0, smoothY=0;
let detected=false;

const video = document.getElementById("video");

const hands = new Hands({
  locateFile: f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});

hands.setOptions({
  maxNumHands:1,
  modelComplexity:0, // MAIS LEVE!
  minDetectionConfidence:0.6,
  minTrackingConfidence:0.6
});

hands.onResults(r=>{
  if(r.multiHandLandmarks.length){
    detected=true;
    const finger = r.multiHandLandmarks[0][8];

    targetX = (finger.x - 0.5)*20;
    targetY = -(finger.y - 0.5)*10;
  } else detected=false;
});

const cam = new Camera(video,{
  onFrame: async()=> await hands.send({image:video}),
  width:640,
  height:480
});
cam.start();

// ===== CONTROLE =====
let selected = null;

function pickPlanet(x,y){
  let closest=null;
  let min=999;

  planets.forEach(p=>{
    const d = Math.hypot(p.mesh.position.x-x, p.mesh.position.y-y);
    if(d<1 && d<min){
      min=d;
      closest=p;
    }
  });

  return closest;
}

// ===== LOOP =====
function animate(){
  requestAnimationFrame(animate);

  smoothX += (targetX - smoothX)*0.15;
  smoothY += (targetY - smoothY)*0.15;

  if(detected){
    if(!selected){
      selected = pickPlanet(smoothX, smoothY);
    }
    if(selected){
      selected.mesh.position.x = smoothX;
      selected.mesh.position.y = smoothY;
    }
  } else {
    selected = null;
  }

  // verificação + rotação
  planets.forEach(p=>{
    const dist = p.mesh.position.length();
    const correct = Math.abs(dist - p.dist) < 0.5;

    if(correct){
      p.mesh.rotation.y += 0.02;
      p.mesh.material.emissive = new THREE.Color(0x00ff00);
    } else {
      p.mesh.material.emissive = new THREE.Color(0x000000);
    }
  });

  renderer.render(scene,camera);
}

animate();

// resize
addEventListener("resize",()=>{
  renderer.setSize(innerWidth,innerHeight);
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>
