<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo dos Planetas</title>

<style>
body { margin: 0; overflow: hidden; background: black; }
video {
  position: absolute;
  bottom: 10px;
  right: 10px;
  width: 120px;
  opacity: 0.6;
  border-radius: 10px;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

</head>
<body>

<video id="video" autoplay playsinline></video>

<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 8;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ===== LUZ =====
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const light = new THREE.PointLight(0xffffff, 2);
light.position.set(5,5,5);
scene.add(light);

// ===== SOL =====
const sun = new THREE.Mesh(
  new THREE.SphereGeometry(2, 64, 64),
  new THREE.MeshBasicMaterial({ color: 0xffaa00 })
);
scene.add(sun);

// ===== PLANETAS =====
function createPlanet(color, size) {
  return new THREE.Mesh(
    new THREE.SphereGeometry(size, 32, 32),
    new THREE.MeshStandardMaterial({ color })
  );
}

const mercury = createPlanet(0xaaaaaa, 0.4);
const earth = createPlanet(0x3399ff, 0.7);

mercury.position.set(-3, 2, 0);
earth.position.set(3, 2, 0);

scene.add(mercury);
scene.add(earth);

// ===== POSIÇÕES CORRETAS =====
const targets = {
  mercury: new THREE.Vector3(2.5, 0, 0),
  earth: new THREE.Vector3(4.5, 0, 0)
};

// ===== CONTROLE =====
let targetX = 0, targetY = 0;
let smoothX = 0, smoothY = 0;
let detected = false;
let selectedPlanet = mercury;

// ===== MEDIAPIPE =====
const video = document.getElementById("video");

const hands = new Hands({
  locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 1,
  minDetectionConfidence: 0.8,
  minTrackingConfidence: 0.8
});

hands.onResults(results => {
  if (results.multiHandLandmarks.length > 0) {
    detected = true;
    const finger = results.multiHandLandmarks[0][8];

    targetX = (finger.x - 0.5) * 10;
    targetY = -(finger.y - 0.5) * 6;
  } else {
    detected = false;
  }
});

const cam = new Camera(video, {
  onFrame: async () => await hands.send({ image: video }),
  width: 640,
  height: 480
});
cam.start();

// ===== FUNÇÕES =====
function isNear(obj, target) {
  return obj.position.distanceTo(target) < 0.5;
}

function snapIfClose(planet, target) {
  if (isNear(planet, target)) {
    planet.position.copy(target);
    return true;
  }
  return false;
}

// ===== ANIMAÇÃO =====
function animate() {
  requestAnimationFrame(animate);

  smoothX += (targetX - smoothX) * 0.1;
  smoothY += (targetY - smoothY) * 0.1;

  if (detected) {
    selectedPlanet.position.x = smoothX;
    selectedPlanet.position.y = smoothY;
  }

  // VERIFICA POSIÇÃO
  const mercuryCorrect = snapIfClose(mercury, targets.mercury);
  const earthCorrect = snapIfClose(earth, targets.earth);

  // REGRA DO JOGO
  if (mercuryCorrect) mercury.rotation.y += 0.05;
  if (earthCorrect) earth.rotation.y += 0.05;

  renderer.render(scene, camera);
}

animate();

// ===== RESIZE =====
addEventListener("resize", () => {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>
