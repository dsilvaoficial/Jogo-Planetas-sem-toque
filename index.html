<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; overflow:hidden; }

video {
  position: fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:1;
}

canvas {
  position:fixed;
  top:0;
  left:0;
  z-index:2;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
</head>

<body>

<video id="video" autoplay playsinline></video>

<script>
// ===== CENA =====
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 18;

const renderer = new THREE.WebGLRenderer({ alpha:true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ===== LUZ =====
scene.add(new THREE.AmbientLight(0xffffff, 0.7));
scene.add(new THREE.PointLight(0xffffff, 1.5));

// ===== TEXTURAS =====
const loader = new THREE.TextureLoader();

const texEarth = loader.load("https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg");
const texJupiter = loader.load("https://threejs.org/examples/textures/planets/jupiter.jpg");
const texSaturn = loader.load("https://threejs.org/examples/textures/planets/saturn.jpg");
const texRing = loader.load("https://threejs.org/examples/textures/planets/saturnringcolor.jpg");

// ===== SOL =====
const sun = new THREE.Mesh(
  new THREE.SphereGeometry(1.5,64,64),
  new THREE.MeshBasicMaterial({color:0xffaa00})
);
scene.add(sun);

// ===== ÓRBITA + ZONA =====
function createOrbit(r){
  const curve = new THREE.EllipseCurve(0,0,r,r);
  const pts = curve.getPoints(100);

  const line = new THREE.LineLoop(
    new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({ color:0xffffff })
  );

  // zona de encaixe (sombra)
  const zone = new THREE.Mesh(
    new THREE.RingGeometry(r-0.3, r+0.3, 64),
    new THREE.MeshBasicMaterial({
      color:0x00ff00,
      transparent:true,
      opacity:0.1
    })
  );
  zone.rotation.x = Math.PI/2;

  scene.add(zone);
  return line;
}

// ===== PLANETAS =====
function createPlanet(size, material){
  return new THREE.Mesh(
    new THREE.SphereGeometry(size,64,64),
    material
  );
}

const earth = createPlanet(0.6, new THREE.MeshStandardMaterial({map:texEarth}));
const jupiter = createPlanet(1, new THREE.MeshStandardMaterial({map:texJupiter}));
const saturn = createPlanet(0.9, new THREE.MeshStandardMaterial({map:texSaturn}));

// anel Saturno
const ring = new THREE.Mesh(
  new THREE.RingGeometry(1.2,2,64),
  new THREE.MeshBasicMaterial({
    map: texRing,
    side: THREE.DoubleSide,
    transparent:true
  })
);
ring.rotation.x = Math.PI/2;
saturn.add(ring);

// posições iniciais
earth.position.set(-6,3,0);
jupiter.position.set(6,3,0);
saturn.position.set(0,-5,0);

scene.add(earth, jupiter, saturn);

// órbitas
scene.add(createOrbit(5));
scene.add(createOrbit(8));
scene.add(createOrbit(11));

// ===== MÃO =====
let tx=0, ty=0, sx=0, sy=0;
let detected=false;

const video = document.getElementById("video");

const hands = new Hands({
  locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});

hands.setOptions({
  maxNumHands:1,
  modelComplexity:0,
  minDetectionConfidence:0.6,
  minTrackingConfidence:0.6
});

hands.onResults(r=>{
  if(r.multiHandLandmarks.length){
    detected=true;
    const f = r.multiHandLandmarks[0][8];
    tx = (f.x-0.5)*16;
    ty = -(f.y-0.5)*10;
  } else detected=false;
});

new Camera(video,{
  onFrame:async()=>await hands.send({image:video}),
  width:640,
  height:480
}).start();

// ===== PEGAR PLANETA =====
let selected=null;

function pick(x,y){
  let objs=[earth,jupiter,saturn];
  return objs.find(o=> Math.hypot(o.position.x-x,o.position.y-y)<1.5);
}

// ===== LOOP =====
function animate(){
  requestAnimationFrame(animate);

  sx += (tx-sx)*0.2;
  sy += (ty-sy)*0.2;

  if(detected){
    if(!selected) selected = pick(sx,sy);

    if(selected){
      selected.position.x = sx;
      selected.position.y = sy;
    }
  } else selected=null;

  // validação
  const planets = [
    {obj:earth, dist:5},
    {obj:jupiter, dist:8},
    {obj:saturn, dist:11}
  ];

  planets.forEach(p=>{
    const d = p.obj.position.length();
    const correct = Math.abs(d - p.dist) < 0.5;

    if(correct){
      // encaixe magnético
      const ang = Math.atan2(p.obj.position.y,p.obj.position.x);
      p.obj.position.x = Math.cos(ang)*p.dist;
      p.obj.position.y = Math.sin(ang)*p.dist;

      p.obj.rotation.y += 0.03;
      p.obj.material.emissive.set(0x00ff00);
    } else {
      p.obj.material.emissive.set(0x000000);
    }
  });

  renderer.render(scene,camera);
}
animate();

// resize
addEventListener("resize",()=>{
  renderer.setSize(innerWidth,innerHeight);
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>
