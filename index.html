<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Solar Realista</title>

<style>
body { margin: 0; overflow: hidden; background: black; }
#video {
  position: absolute;
  bottom: 10px;
  right: 10px;
  width: 120px;
  border-radius: 10px;
  opacity: 0.7;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

</head>
<body>

<video id="video" autoplay playsinline></video>

<script>
// ===== CENA =====
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 20;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ===== LUZ =====
scene.add(new THREE.AmbientLight(0xffffff, 0.4));

const light = new THREE.PointLight(0xffffff, 2);
light.position.set(0,0,0);
scene.add(light);

// ===== FUNDO =====
const stars = new THREE.Points(
  new THREE.BufferGeometry().setAttribute(
    'position',
    new THREE.Float32BufferAttribute(
      Array.from({length:3000},()=> (Math.random()-0.5)*300),
      3
    )
  ),
  new THREE.PointsMaterial({color:0xffffff})
);
scene.add(stars);

// ===== TEXTURAS =====
const loader = new THREE.TextureLoader();

const texEarth = loader.load("https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg");
const texJupiter = loader.load("https://threejs.org/examples/textures/planets/jupiter.jpg");
const texSaturn = loader.load("https://threejs.org/examples/textures/planets/saturn.jpg");
const texRing = loader.load("https://threejs.org/examples/textures/planets/saturnringcolor.jpg");

// ===== SOL =====
const sun = new THREE.Mesh(
  new THREE.SphereGeometry(2,64,64),
  new THREE.MeshBasicMaterial({color:0xffaa00})
);
scene.add(sun);

// ===== ÓRBITAS =====
function orbit(r){
  const curve = new THREE.EllipseCurve(0,0,r,r);
  const pts = curve.getPoints(100);
  return new THREE.LineLoop(
    new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({color:0x4444ff})
  );
}

// ===== PLANETAS =====
const earth = new THREE.Mesh(
  new THREE.SphereGeometry(0.6,64,64),
  new THREE.MeshStandardMaterial({map:texEarth})
);

const jupiter = new THREE.Mesh(
  new THREE.SphereGeometry(1.2,64,64),
  new THREE.MeshStandardMaterial({map:texJupiter})
);

const saturn = new THREE.Mesh(
  new THREE.SphereGeometry(1,64,64),
  new THREE.MeshStandardMaterial({map:texSaturn})
);

// ===== ANEL DE SATURNO =====
const ring = new THREE.Mesh(
  new THREE.RingGeometry(1.4, 2.2, 64),
  new THREE.MeshBasicMaterial({
    map: texRing,
    side: THREE.DoubleSide,
    transparent: true
  })
);
ring.rotation.x = Math.PI / 2;
saturn.add(ring);

// posições iniciais (bagunçadas)
earth.position.set(-8, 4, 0);
jupiter.position.set(8, 3, 0);
saturn.position.set(0, -4, 0);

scene.add(earth, jupiter, saturn);

// órbitas corretas
scene.add(orbit(5));
scene.add(orbit(8));
scene.add(orbit(11));

// ===== CONTROLE MÃO =====
let tx=0, ty=0, sx=0, sy=0, detected=false;

const video = document.getElementById("video");

const hands = new Hands({
  locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});

hands.setOptions({
  maxNumHands:1,
  modelComplexity:0,
  minDetectionConfidence:0.6,
  minTrackingConfidence:0.6
});

hands.onResults(r=>{
  if(r.multiHandLandmarks.length){
    detected=true;
    const f = r.multiHandLandmarks[0][8];
    tx = (f.x-0.5)*20;
    ty = -(f.y-0.5)*10;
  } else detected=false;
});

new Camera(video,{
  onFrame:async()=>await hands.send({image:video}),
  width:640,
  height:480
}).start();

// ===== SELEÇÃO =====
let selected=null;

function pick(x,y){
  let objs=[earth,jupiter,saturn];
  return objs.find(o=> Math.hypot(o.position.x-x,o.position.y-y)<1);
}

// ===== LOOP =====
function animate(){
  requestAnimationFrame(animate);

  sx += (tx-sx)*0.15;
  sy += (ty-sy)*0.15;

  if(detected){
    if(!selected) selected = pick(sx,sy);
    if(selected){
      selected.position.x = sx;
      selected.position.y = sy;
    }
  } else selected=null;

  // verificação
  const planets = [
    {obj:earth, dist:5},
    {obj:jupiter, dist:8},
    {obj:saturn, dist:11}
  ];

  planets.forEach(p=>{
    const d = p.obj.position.length();
    const correct = Math.abs(d - p.dist) < 0.5;

    if(correct){
      p.obj.rotation.y += 0.02;
      p.obj.material.emissive = new THREE.Color(0x00ff00);
    } else {
      p.obj.material.emissive = new THREE.Color(0x000000);
    }
  });

  renderer.render(scene,camera);
}
animate();

// resize
addEventListener("resize",()=>{
  renderer.setSize(innerWidth,innerHeight);
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>
