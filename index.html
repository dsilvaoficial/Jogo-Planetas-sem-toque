<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo Sistema Solar</title>

<style>
body { margin:0; overflow:hidden; }

/* CÂMERA EM TELA CHEIA */
video {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 1;
}

/* CANVAS 3D POR CIMA */
canvas {
  position: fixed;
  top:0;
  left:0;
  z-index: 2;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
</head>

<body>

<video id="video" autoplay playsinline></video>

<script>
// ===== THREE =====
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 18;

const renderer = new THREE.WebGLRenderer({ alpha:true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// luz
scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const light = new THREE.PointLight(0xffffff, 1.5);
scene.add(light);

// ===== SOL (MENOR) =====
const sun = new THREE.Mesh(
  new THREE.SphereGeometry(1.5, 64, 64),
  new THREE.MeshBasicMaterial({ color: 0xffaa00 })
);
scene.add(sun);

// ===== ÓRBITAS =====
function orbit(r){
  const curve = new THREE.EllipseCurve(0,0,r,r);
  const pts = curve.getPoints(100);
  return new THREE.LineLoop(
    new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({ color: 0xffffff })
  );
}

// ===== PLANETAS =====
const data = [
  {name:"Mercury", color:0xaaaaaa, size:0.3, dist:3},
  {name:"Venus", color:0xffaa66, size:0.5, dist:4},
  {name:"Earth", color:0x3399ff, size:0.5, dist:5},
  {name:"Mars", color:0xff3300, size:0.4, dist:6},
  {name:"Jupiter", color:0xffcc99, size:1, dist:8},
  {name:"Saturn", color:0xffddaa, size:0.9, dist:10},
  {name:"Uranus", color:0x66ccff, size:0.7, dist:12},
  {name:"Neptune", color:0x3366ff, size:0.7, dist:14},
];

const planets = [];

data.forEach(p=>{
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(p.size,32,32),
    new THREE.MeshStandardMaterial({ color:p.color })
  );

  mesh.position.set(
    (Math.random()-0.5)*10,
    (Math.random()-0.5)*6,
    0
  );

  scene.add(mesh);
  scene.add(orbit(p.dist));

  planets.push({mesh, ...p});
});

// ===== MÃO =====
let tx=0, ty=0, sx=0, sy=0;
let detected=false;

const video = document.getElementById("video");

const hands = new Hands({
  locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});

hands.setOptions({
  maxNumHands:1,
  modelComplexity:0,
  minDetectionConfidence:0.6,
  minTrackingConfidence:0.6
});

hands.onResults(r=>{
  if(r.multiHandLandmarks.length){
    detected=true;
    const f = r.multiHandLandmarks[0][8];

    tx = (f.x-0.5)*16;
    ty = -(f.y-0.5)*10;
  } else detected=false;
});

new Camera(video,{
  onFrame: async()=> await hands.send({image:video}),
  width:640,
  height:480
}).start();

// ===== SELEÇÃO =====
let selected=null;

function pick(x,y){
  let best=null;
  let min=999;

  planets.forEach(p=>{
    const d = Math.hypot(p.mesh.position.x-x, p.mesh.position.y-y);
    if(d<1.5 && d<min){
      min=d;
      best=p;
    }
  });

  return best;
}

// ===== LOOP =====
function animate(){
  requestAnimationFrame(animate);

  sx += (tx - sx)*0.2;
  sy += (ty - sy)*0.2;

  if(detected){
    if(!selected) selected = pick(sx,sy);

    if(selected){
      // LIMITAR ÁREA (não entrar no sol)
      const distCenter = Math.hypot(sx, sy);
      if(distCenter > 2){
        selected.mesh.position.x = sx;
        selected.mesh.position.y = sy;
      }
    }
  } else {
    selected=null;
  }

  // CHECK + SNAP + ROTAÇÃO
  planets.forEach(p=>{
    const d = p.mesh.position.length();
    const correct = Math.abs(d - p.dist) < 0.4;

    if(correct){
      // SNAP FORTE
      const angle = Math.atan2(p.mesh.position.y, p.mesh.position.x);
      p.mesh.position.x = Math.cos(angle)*p.dist;
      p.mesh.position.y = Math.sin(angle)*p.dist;

      p.mesh.rotation.y += 0.02;
      p.mesh.material.emissive.set(0x00ff00);
    } else {
      p.mesh.material.emissive.set(0x000000);
    }
  });

  renderer.render(scene,camera);
}

animate();

// resize
addEventListener("resize",()=>{
  renderer.setSize(innerWidth,innerHeight);
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>
